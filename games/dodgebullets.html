<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodge Bullets — PlayForge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0f;color:#fff;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,255,.015) 2px,rgba(0,255,255,.015) 4px);pointer-events:none;z-index:0;}
  nav{width:100%;padding:16px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(0,255,255,.15);background:rgba(10,10,15,.9);position:relative;z-index:10;}
  nav a{color:#0ff;text-decoration:none;font-size:.75rem;letter-spacing:.15em;opacity:.7;transition:.2s;}
  nav a:hover{opacity:1;}
  nav span{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;color:#fff;letter-spacing:.2em;}
  .hud{display:flex;gap:40px;padding:16px 0 8px;position:relative;z-index:5;}
  .hud-item{text-align:center;}
  .hud-label{font-size:.6rem;letter-spacing:.2em;color:rgba(255,255,255,.4);margin-bottom:4px;}
  .hud-value{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:700;color:#0ff;}
  #arena{position:relative;z-index:5;border:1px solid rgba(0,255,255,.3);box-shadow:0 0 30px rgba(0,255,255,.1),inset 0 0 30px rgba(0,0,0,.5);background:#0a0a0f;cursor:none;}
  #player{position:absolute;width:18px;height:18px;background:#0ff;box-shadow:0 0 15px #0ff,0 0 30px rgba(0,255,255,.5);transform:translate(-50%,-50%);border-radius:2px;transition:none;}
  .bullet{position:absolute;background:#f0f;box-shadow:0 0 8px #f0f;transform:translate(-50%,-50%);border-radius:50%;}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,15,.85);z-index:20;gap:16px;}
  .overlay h2{font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;letter-spacing:.2em;color:#0ff;text-shadow:0 0 20px #0ff;}
  .overlay p{font-size:.75rem;letter-spacing:.15em;color:rgba(255,255,255,.5);}
  .overlay .score-big{font-family:'Orbitron',monospace;font-size:1.2rem;color:#fff;}
  btn,.btn{background:transparent;border:1px solid #0ff;color:#0ff;font-family:'Share Tech Mono',monospace;font-size:.75rem;letter-spacing:.2em;padding:12px 32px;cursor:pointer;transition:.2s;margin-top:8px;}
  .btn:hover{background:#0ff;color:#0a0a0f;}
  .info{font-size:.65rem;letter-spacing:.12em;color:rgba(255,255,255,.3);padding:8px 0;position:relative;z-index:5;}
</style>
</head>
<body>
<nav><a href="../index.html">← BACK</a><span>DODGE BULLETS</span></nav>
<div class="hud">
  <div class="hud-item"><div class="hud-label">SCORE</div><div class="hud-value" id="score">0</div></div>
  <div class="hud-item"><div class="hud-label">TIME</div><div class="hud-value" id="timer">0s</div></div>
  <div class="hud-item"><div class="hud-label">LEVEL</div><div class="hud-value" id="level">1</div></div>
</div>
<canvas id="arena" width="520" height="480"></canvas>
<div class="info">ARROW KEYS / WASD TO DODGE  |  SURVIVE AS LONG AS POSSIBLE</div>

<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let player = {x: W/2, y: H/2, r: 9, speed: 4};
let bullets = [];
let particles = [];
let score = 0, elapsed = 0, level = 1;
let running = false, gameOver = false;
let lastTime = 0, bulletTimer = 0;
let keys = {};

// input
window.addEventListener('keydown', e => { keys[e.key] = true; if(!running && !gameOver) startGame(); });
window.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  if(!running) return;
  const r = canvas.getBoundingClientRect();
  player.x = e.clientX - r.left;
  player.y = e.clientY - r.top;
});

function spawnBullet() {
  const side = Math.floor(Math.random()*4);
  let x, y, vx, vy;
  const spd = 2 + level*0.6 + Math.random()*1.5;
  if(side===0){x=Math.random()*W;y=-10;vx=(Math.random()-.5)*2;vy=spd;}
  else if(side===1){x=W+10;y=Math.random()*H;vx=-spd;vy=(Math.random()-.5)*2;}
  else if(side===2){x=Math.random()*W;y=H+10;vx=(Math.random()-.5)*2;vy=-spd;}
  else{x=-10;y=Math.random()*H;vx=spd;vy=(Math.random()-.5)*2;}
  // aimed bullets at higher levels
  if(level > 2 && Math.random() < 0.4) {
    const ang = Math.atan2(player.y-y, player.x-x);
    vx = Math.cos(ang)*spd; vy = Math.sin(ang)*spd;
  }
  const r = 4 + Math.random()*3;
  bullets.push({x,y,vx,vy,r});
}

function spawnParticles(x, y) {
  for(let i=0;i<20;i++) {
    const ang = Math.random()*Math.PI*2;
    const spd = 1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,r:2+Math.random()*3});
  }
}

function startGame() {
  player = {x:W/2,y:H/2,r:9,speed:4};
  bullets=[]; particles=[]; score=0; elapsed=0; level=1;
  bulletTimer=0; gameOver=false; running=true;
  lastTime=performance.now();
  requestAnimationFrame(loop);
}

function loop(ts) {
  if(!running) return;
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;
  elapsed += dt;
  score = Math.floor(elapsed*10);
  level = Math.floor(elapsed/10)+1;
  document.getElementById('score').textContent = score;
  document.getElementById('timer').textContent = Math.floor(elapsed)+'s';
  document.getElementById('level').textContent = level;

  // move player with keys
  const spd = player.speed;
  if(keys['ArrowLeft']||keys['a']||keys['A']) player.x -= spd;
  if(keys['ArrowRight']||keys['d']||keys['D']) player.x += spd;
  if(keys['ArrowUp']||keys['w']||keys['W']) player.y -= spd;
  if(keys['ArrowDown']||keys['s']||keys['S']) player.y += spd;
  player.x = Math.max(player.r, Math.min(W-player.r, player.x));
  player.y = Math.max(player.r, Math.min(H-player.r, player.y));

  // spawn bullets
  bulletTimer += dt;
  const interval = Math.max(0.18, 0.5 - level*0.03);
  if(bulletTimer > interval) { spawnBullet(); bulletTimer=0; }

  // update bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    return b.x > -30 && b.x < W+30 && b.y > -30 && b.y < H+30;
  });

  // particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life -= dt*2; p.vx*=0.95; p.vy*=0.95;
    return p.life > 0;
  });

  // collision
  for(const b of bullets) {
    const dx=b.x-player.x, dy=b.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy) < b.r+player.r-2) {
      spawnParticles(player.x, player.y);
      running=false; gameOver=true;
      draw(); showGameOver(); return;
    }
  }

  draw();
  requestAnimationFrame(loop);
}

function draw() {
  ctx.clearRect(0,0,W,H);
  // grid
  ctx.strokeStyle='rgba(0,255,255,0.04)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = '#0ff';
    ctx.shadowBlur = 6; ctx.shadowColor='#0ff';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // bullets
  bullets.forEach(b => {
    ctx.shadowBlur=12; ctx.shadowColor='#f0f';
    ctx.fillStyle='#f0f';
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  });

  if(!gameOver) {
    // player
    ctx.shadowBlur=20; ctx.shadowColor='#0ff';
    ctx.fillStyle='#0ff';
    ctx.beginPath();
    ctx.rect(player.x-player.r, player.y-player.r, player.r*2, player.r*2);
    ctx.fill();
    ctx.shadowBlur=0;
  }

  if(!running && !gameOver) {
    // start screen
    ctx.fillStyle='rgba(10,10,15,0.7)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0ff';
    ctx.font='bold 28px Orbitron';
    ctx.textAlign='center';
    ctx.shadowBlur=20; ctx.shadowColor='#0ff';
    ctx.fillText('DODGE BULLETS', W/2, H/2-40);
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.font='12px Share Tech Mono';
    ctx.fillText('PRESS ANY KEY OR MOVE MOUSE TO START', W/2, H/2+10);
    ctx.fillText('USE ARROW KEYS / WASD OR MOUSE TO DODGE', W/2, H/2+35);
  }
}

function showGameOver() {
  ctx.fillStyle='rgba(10,10,15,0.85)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#f0f';
  ctx.font='bold 36px Orbitron';
  ctx.shadowBlur=20; ctx.shadowColor='#f0f';
  ctx.fillText('GAME OVER', W/2, H/2-60);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';
  ctx.font='14px Share Tech Mono';
  ctx.fillText('SCORE: '+score+'  |  TIME: '+Math.floor(elapsed)+'s  |  LEVEL: '+level, W/2, H/2-10);
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.font='11px Share Tech Mono';
  ctx.fillText('PRESS ANY KEY TO PLAY AGAIN', W/2, H/2+30);
  window.addEventListener('keydown', ()=>{ if(gameOver) startGame(); }, {once:true});
  canvas.addEventListener('click', ()=>{ if(gameOver) startGame(); }, {once:true});
}

draw(); // show start screen
</script>
</body>
</html>
